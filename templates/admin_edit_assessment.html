<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Submission</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='theme.css') }}">
    <style>
        body { font-family: Arial, sans-serif; max-width: 820px; margin: 2rem auto; line-height: 1.5; padding: 0 1rem; }
        .header { text-align: right; font-size: 0.9rem; margin-bottom: 1rem; }
        .card { border: 1px solid #ddd; border-radius: 8px; background: #fff; padding: 1rem 1.25rem; }
        .row { margin-bottom: 0.8rem; }
        label { display: block; font-size: 0.9rem; margin-bottom: 0.25rem; }
        input, select, textarea {
            width: 100%;
            border: 1px solid #c8c8c8;
            border-radius: 4px;
            padding: 0.5rem 0.6rem;
            box-sizing: border-box;
            font-family: inherit;
            font-size: 0.95rem;
        }
        textarea { min-height: 110px; resize: vertical; }
        .meta { font-size: 0.9rem; color: #555; margin-bottom: 0.8rem; }
        .error {
            margin-bottom: 0.9rem;
            padding: 0.65rem 0.8rem;
            border: 1px solid #f5c2c7;
            background: #f8d7da;
            border-radius: 6px;
            color: #842029;
        }
        .actions { display: flex; gap: 0.65rem; margin-top: 1rem; }
        .actions button,
        .actions a {
            border: none;
            text-decoration: none;
            border-radius: 4px;
            padding: 0.5rem 0.8rem;
            color: #fff;
            cursor: pointer;
            font-size: 0.95rem;
        }
        .actions button { background: #4b7470; }
        .actions a { background: #6c757d; }
    </style>
</head>
<body>
    {% include '_master_menu.html' %}
    <div class="header">
        Logged in as <strong>{{ admin_name }}</strong> &lt;{{ admin_email }}&gt;
    </div>

    <div class="card">
        <h1>Edit Submission</h1>
        <p class="meta">Record ID: <strong>{{ record.id }}</strong></p>

        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}

        <form method="post">
            <div class="row">
                <label for="name">Process Name</label>
                <input id="name" name="name" value="{{ record.name if record.name else '' }}">
            </div>
            <div class="row">
                <label for="purpose">Purpose</label>
                <textarea id="purpose" name="purpose">{{ record.purpose if record.purpose else '' }}</textarea>
            </div>
            <div class="row">
                <label for="process_type">Process Type</label>
                <select id="process_type" name="process_type" required>
                    {% for key, template in process_types.items() %}
                        <option value="{{ key }}" {% if record.type == key %}selected{% endif %}>{{ key }} - {{ template.label }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="row">
                <label for="path">Path</label>
                <select id="path" name="path" required>
                    <option value="quick" {% if record.path == 'quick' %}selected{% endif %}>quick</option>
                    <option value="deep" {% if record.path == 'deep' %}selected{% endif %}>deep</option>
                </select>
            </div>
            <div class="row">
                <label for="status">Status</label>
                <select id="status" name="status" required>
                    <option value="partial" {% if record.status == 'partial' %}selected{% endif %}>partial</option>
                    <option value="submitted" {% if record.status == 'submitted' %}selected{% endif %}>submitted</option>
                </select>
            </div>
            <div class="row">
                <label for="user_email">Owner Email</label>
                <input id="user_email" name="user_email" type="email" required value="{{ record.user.email if record.user and record.user.email else '' }}">
            </div>

            <div class="actions">
                <button type="submit">Save Submission</button>
                <a href="{{ url_for('admin_db_view') }}">Cancel</a>
            </div>
        </form>
    </div>
</body>
</html>
