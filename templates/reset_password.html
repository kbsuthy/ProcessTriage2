<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reset Password</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='theme.css') }}">
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 2rem auto; }
        label { display: block; margin-top: 1rem; }
        input[type="password"] { width: 100%; padding: 0.5rem; }
        .error { color: red; margin-top: 1rem; }
        .success { color: green; margin-top: 1rem; }
        .submit { text-align: center; margin-top: 2rem; }
    </style>
</head>
<body>
    {% include '_master_menu.html' %}
    <h1>Reset Password</h1>
    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}
    {% if success %}
        <div class="success">{{ success }}</div>
    {% endif %}
    <form method="post">
        <label for="current_password">Current password <span style="color: red">*</span></label>
        <input type="password" id="current_password" name="current_password" required>

        <label for="new_password">New password <span style="color: red">*</span></label>
        <input type="password" id="new_password" name="new_password" required>

        <label for="new_password_confirm">Confirm new password <span style="color: red">*</span></label>
        <input type="password" id="new_password_confirm" name="new_password_confirm" required>

        <div class="submit">
            <button type="submit">Update Password</button>
        </div>
    </form>
</body>
</html>
