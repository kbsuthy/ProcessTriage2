<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Submit Feedback</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='theme.css') }}">
    <style>
        body { font-family: Arial, sans-serif; max-width: 900px; margin: 2rem auto; line-height: 1.5; padding: 0 1rem; }
        .card { border: 1px solid #ddd; border-radius: 8px; background: #fff; padding: 1rem 1.25rem; }
        .header { margin-bottom: 1rem; color: #555; font-size: 0.95rem; }
        label { display: block; margin-bottom: 0.25rem; font-weight: 600; }
        select, textarea {
            width: 100%;
            border: 1px solid #ccc;
            border-radius: 6px;
            padding: 0.55rem;
            box-sizing: border-box;
            margin-bottom: 0.85rem;
            font-family: inherit;
            font-size: 0.95rem;
        }
        textarea { min-height: 170px; resize: vertical; }
        .hint { margin-top: -0.45rem; margin-bottom: 0.9rem; color: #666; font-size: 0.88rem; }
        .error {
            margin-bottom: 0.8rem;
            padding: 0.65rem 0.8rem;
            border: 1px solid #f1aeb5;
            background: #f8d7da;
            color: #842029;
            border-radius: 6px;
        }
        .success {
            margin-bottom: 0.8rem;
            padding: 0.65rem 0.8rem;
            border: 1px solid #badbcc;
            background: #d1e7dd;
            color: #0f5132;
            border-radius: 6px;
        }
        button {
            border: none;
            border-radius: 6px;
            padding: 0.55rem 0.85rem;
            color: #fff;
            background: #4b7470;
            cursor: pointer;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>
    {% include '_master_menu.html' %}

    <div class="card">
        <h1>Submit Feedback</h1>
        <div class="header">Signed in as <strong>{{ user_name }}</strong> &lt;{{ user_email }}&gt;</div>
        <p>Share requests, ideas, or information. Messages are visible to admins only.</p>

        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}
        {% if success %}
            <div class="success">{{ success }}</div>
        {% endif %}

        <form method="post" action="{{ url_for('feedback_form') }}">
            <label for="feedback_type">Feedback Type</label>
            <select id="feedback_type" name="feedback_type" required>
                <option value="request" {% if feedback_type == 'request' %}selected{% endif %}>Request</option>
                <option value="idea" {% if feedback_type == 'idea' %}selected{% endif %}>Idea</option>
                <option value="info" {% if feedback_type == 'info' %}selected{% endif %}>Information</option>
            </select>

            <label for="message">Message</label>
            <textarea id="message" name="message" maxlength="4000" required>{{ message }}</textarea>
            <div class="hint">Between 5 and 4000 characters.</div>

            <button type="submit">Send Feedback</button>
        </form>
    </div>
</body>
</html>
