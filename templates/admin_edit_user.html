<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit User</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='theme.css') }}">
    <style>
        body { font-family: Arial, sans-serif; max-width: 760px; margin: 2rem auto; line-height: 1.5; padding: 0 1rem; }
        .header { text-align: right; font-size: 0.9rem; margin-bottom: 1rem; }
        .card { border: 1px solid #ddd; border-radius: 8px; background: #fff; padding: 1rem 1.25rem; }
        .row { margin-bottom: 0.8rem; }
        label { display: block; font-size: 0.9rem; margin-bottom: 0.25rem; }
        input {
            width: 100%;
            border: 1px solid #c8c8c8;
            border-radius: 4px;
            padding: 0.5rem 0.6rem;
            box-sizing: border-box;
        }
        .error {
            margin-bottom: 0.9rem;
            padding: 0.65rem 0.8rem;
            border: 1px solid #f5c2c7;
            background: #f8d7da;
            border-radius: 6px;
            color: #842029;
        }
        .actions { display: flex; gap: 0.65rem; margin-top: 1rem; }
        .actions button,
        .actions a {
            border: none;
            text-decoration: none;
            border-radius: 4px;
            padding: 0.5rem 0.8rem;
            color: #fff;
            cursor: pointer;
            font-size: 0.95rem;
        }
        .actions button { background: #4b7470; }
        .actions a { background: #6c757d; }
    </style>
</head>
<body>
    {% include '_master_menu.html' %}
    <div class="header">
        Logged in as <strong>{{ admin_name }}</strong> &lt;{{ admin_email }}&gt;
    </div>

    <div class="card">
        <h1>Edit User</h1>
        <p>Update account details for this user.</p>

        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}

        <form method="post">
            <div class="row">
                <label for="first_name">First Name</label>
                <input id="first_name" name="first_name" value="{{ target_user.first_name if target_user.first_name else '' }}">
            </div>
            <div class="row">
                <label for="last_name">Last Name</label>
                <input id="last_name" name="last_name" value="{{ target_user.last_name if target_user.last_name else '' }}">
            </div>
            <div class="row">
                <label for="email">Email</label>
                <input id="email" name="email" type="email" required value="{{ target_user.email if target_user.email else '' }}">
            </div>
            <div class="row">
                <label>Created</label>
                <div>{{ target_user.created if target_user.created else 'N/A' }}</div>
            </div>

            <div class="actions">
                <button type="submit">Save User</button>
                <a href="{{ url_for('admin_db_view') }}">Cancel</a>
            </div>
        </form>
    </div>
</body>
</html>
